<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header class="header">

        <div>
            <h1>Budget Planner</h1>
            <p>Welcome, <strong id="username"></strong></p>
        </div>

        <button id="logoutBtn">Logout</button>

    </header>

    <hr>

    <section>

        <h2>Create Budget</h2>

        <form id="budgetForm">

            <input
                type="text"
                id="category"
                placeholder="Budget Category"
                required
            >

            <input
                type="number"
                id="amount"
                placeholder="Budget Amount"
                min="0"
                step="0.01"
                required
            >

            <button type="submit">
                Add Budget
            </button>

        </form>

    </section>

    <section class="summary">

        <h2>Total Planned Budget</h2>

        <h3>$<span id="total">0.00</span></h3>

    </section>

    <section>

        <h2>Budget Categories</h2>

        <ul id="budgetList">

        </ul>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
